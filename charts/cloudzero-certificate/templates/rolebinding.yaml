---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "cloudzero-certificate.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "cloudzero-certificate.roleName" . }}
  apiGroup: rbac.authorization.k8s.io
