# Test defaults.* properties for Issuer resources
#
# This test validates that Issuer resources properly inherit
# defaults.labels and defaults.annotations from the chart's defaults section.
#
# Issuers only support metadata-level defaults (labels and annotations).
# PodSpec defaults (affinity, tolerations, etc.) do not apply to Issuers.
#
# Templates tested:
# - agent-issuer.yaml (only renders when insightsController.tls.useCertManager is true)
suite: defaults.* properties apply to Issuer resources
templates:
  - agent-issuer.yaml
tests:
  # ============================================================================
  # defaults.labels tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.labels to Issuer metadata
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      insightsController.enabled: true
      insightsController.tls.useCertManager: true
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  # ============================================================================
  # defaults.annotations tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.annotations to Issuer metadata
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      insightsController.enabled: true
      insightsController.tls.useCertManager: true
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation
