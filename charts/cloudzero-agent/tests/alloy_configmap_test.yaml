suite: test Alloy ConfigMap generation
templates:
  - templates/agent-cm.yaml
tests:
  # Test that ConfigMap contains River config for Alloy
  - it: should generate River configuration when Alloy is enabled
    set:
      components.agent.mode: clustered
    asserts:
      - isNotEmpty:
          path: data["alloy-config.river"]
      - isNull:
          path: data["prometheus.yml"]
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "prometheus.scrape"
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "prometheus.remote_write"

  # Test that ConfigMap contains Prometheus config when Alloy is disabled
  - it: should generate Prometheus configuration when Alloy is disabled
    set:
      components.agent.mode: agent
    asserts:
      - isNotEmpty:
          path: data["prometheus.yml"]
      - isNull:
          path: data["alloy-config.river"]
      - matchRegex:
          path: data["prometheus.yml"]
          pattern: "scrape_configs:"
      - matchRegex:
          path: data["prometheus.yml"]
          pattern: "remote_write:"

  # Test that River config includes kube-state-metrics scrape when enabled
  - it: should include kube-state-metrics in River config
    set:
      components.agent.mode: clustered
      prometheusConfig.scrapeJobs.kubeStateMetrics.enabled: true
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "kube_state_metrics"'

  # Test that River config includes aggregator scrape when enabled
  - it: should include aggregator scrape in River config
    set:
      components.agent.mode: clustered
      prometheusConfig.scrapeJobs.aggregator.enabled: true
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "aggregator"'

  # Test that River config respects scrape job toggles
  - it: should not include disabled scrape jobs in River config
    set:
      components.agent.mode: clustered
      prometheusConfig:
        scrapeJobs:
          kubeStateMetrics:
            enabled: false
          aggregator:
            enabled: false
    asserts:
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "kube_state_metrics"'
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "aggregator"'

  # Test that River config includes remote_write
  - it: should include remote_write configuration
    set:
      components.agent.mode: clustered
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.remote_write "cloudzero"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "/collector"

  # Test clustering configuration in River
  - it: should enable clustering in scrape jobs
    set:
      components.agent.mode: clustered
    asserts:
      # Verify clustering is enabled
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "clustering \\{\\s+enabled = true\\s+\\}"

  # Test that River config includes DCGM GPU scrape when enabled
  - it: should include DCGM GPU scrape in River config when enabled
    set:
      components.agent.mode: clustered
      prometheusConfig.scrapeJobs.gpu.enabled: true
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'discovery.kubernetes "dcgm"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "dcgm"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.relabel "dcgm_provenance"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.relabel "dcgm_filter"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.relabel "dcgm_attribution"'

  # Test that River config includes DCGM metric filtering
  - it: should filter DCGM metrics correctly
    set:
      components.agent.mode: clustered
      prometheusConfig.scrapeJobs.gpu.enabled: true
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "DCGM_FI_DEV_GPU_UTIL"
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "DCGM_FI_DEV_FB_USED"
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "DCGM_FI_DEV_FB_FREE"

  # Test that River config includes provenance label for DCGM
  - it: should add provenance label to DCGM metrics
    set:
      components.agent.mode: clustered
      prometheusConfig.scrapeJobs.gpu.enabled: true
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'target_label.*=.*"provenance"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'replacement.*=.*"dcgm"'

  # Test that DCGM scrape is excluded when GPU scraping is disabled
  - it: should not include DCGM scrape when GPU scraping is disabled
    set:
      components.agent.mode: clustered
      prometheusConfig.scrapeJobs.gpu.enabled: false
    asserts:
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'discovery.kubernetes "dcgm"'
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "dcgm"'

  # Test that additionalAlloyConfig is injected when provided
  - it: should inject additionalAlloyConfig when set
    set:
      components.agent.mode: clustered
      prometheusConfig.additionalAlloyConfig: |
        prometheus.scrape "external_cadvisor" {
          targets = [{__address__ = "external-cadvisor.svc:4196"}]
          forward_to = [prometheus.remote_write.cloudzero.receiver]
        }
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "external_cadvisor"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: "external-cadvisor.svc:4196"

  # Test that additionalAlloyConfig section header is absent when empty
  - it: should not include additionalAlloyConfig section when empty
    set:
      components.agent.mode: clustered
    asserts:
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: "USER-PROVIDED ALLOY CONFIGURATION"

  # Test that the built-in cAdvisor scrape job can be disabled via
  # integrations.cAdvisor.enabled=false in Alloy mode
  - it: should not include built-in cAdvisor scrape when integrations.cAdvisor.enabled is false
    set:
      components.agent.mode: clustered
      integrations.cAdvisor.enabled: false
    asserts:
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "cadvisor"'
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'discovery.kubernetes "cadvisor"'

  # Test that the built-in cAdvisor scrape job can be disabled via the
  # deprecated prometheusConfig.scrapeJobs.cadvisor.enabled=false in Alloy mode
  - it: should not include built-in cAdvisor scrape when deprecated cadvisor.enabled is false
    set:
      components.agent.mode: clustered
      prometheusConfig.scrapeJobs.cadvisor.enabled: false
    asserts:
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "cadvisor"'
      - notMatchRegex:
          path: data["alloy-config.river"]
          pattern: 'discovery.kubernetes "cadvisor"'

  # Test that the built-in cAdvisor scrape is present by default in Alloy mode
  - it: should include built-in cAdvisor scrape by default in Alloy mode
    set:
      components.agent.mode: clustered
    asserts:
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'prometheus.scrape "cadvisor"'
      - matchRegex:
          path: data["alloy-config.river"]
          pattern: 'discovery.kubernetes "cadvisor"'
