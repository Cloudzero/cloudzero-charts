# Test defaults.* properties for ServiceAccount resources
#
# This test validates that ServiceAccount resources properly inherit
# defaults.labels and defaults.annotations from the chart's defaults section.
#
# ServiceAccounts only support metadata-level defaults (labels and annotations).
# PodSpec defaults (affinity, tolerations, etc.) do not apply to ServiceAccounts.
#
# Templates tested:
# - agent-serviceaccount.yaml
# - webhook-serviceaccount.yaml
suite: defaults.* properties apply to ServiceAccount resources
templates:
  - agent-serviceaccount.yaml
  - webhook-serviceaccount.yaml
tests:
  # ============================================================================
  # defaults.labels tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.labels to all ServiceAccount metadata
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: ServiceAccount
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      serviceAccount.create: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  - it: should apply defaults.labels to agent-serviceaccount metadata
    template: agent-serviceaccount.yaml
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  - it: should apply defaults.labels to webhook-serviceaccount metadata
    template: webhook-serviceaccount.yaml
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  # ============================================================================
  # defaults.annotations tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.annotations to all ServiceAccount metadata
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: ServiceAccount
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      serviceAccount.create: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation

  - it: should apply defaults.annotations to agent-serviceaccount metadata
    template: agent-serviceaccount.yaml
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      serviceAccount.create: true
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation

  - it: should apply defaults.annotations to webhook-serviceaccount metadata
    template: webhook-serviceaccount.yaml
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation
