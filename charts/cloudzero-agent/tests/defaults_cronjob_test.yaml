# Test defaults.* properties for CronJob resources
#
# This test validates that CronJob resources properly inherit all applicable
# defaults from the chart's defaults section, including:
# - Metadata defaults: labels, annotations
# - PodSpec defaults: affinity, tolerations, nodeSelector, priorityClassName,
#   dns.policy, dns.config, securityContext, image settings
#
# Note: CronJob has nested job template, so paths are deeper:
# - Pod template: spec.jobTemplate.spec.template
# - Pod spec: spec.jobTemplate.spec.template.spec
#
# Templates tested:
# - backfill-job.yaml (produces CronJob at document index 0)
suite: defaults.* properties apply to CronJob resources
templates:
  - backfill-job.yaml
tests:
  # ============================================================================
  # defaults.labels tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.labels to CronJob metadata
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  # ============================================================================
  # defaults.annotations tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.annotations to CronJob metadata
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation

  # ============================================================================
  # defaults.affinity tests
  # ============================================================================
  - it: should apply defaults.affinity to CronJob resources
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: test-defaults-affinity
                    operator: In
                    values:
                      - test-value
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: test-defaults-affinity

  # ============================================================================
  # defaults.tolerations tests
  # ============================================================================
  - it: should apply defaults.tolerations to CronJob resources
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.tolerations:
        - key: test-defaults-toleration
          operator: Equal
          value: test-value
          effect: NoSchedule
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.tolerations[0].key
          value: test-defaults-toleration

  # ============================================================================
  # defaults.nodeSelector tests
  # ============================================================================
  - it: should apply defaults.nodeSelector to CronJob resources
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.nodeSelector:
        test-defaults-node-selector: test-value
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.nodeSelector.test-defaults-node-selector
          value: test-value

  # ============================================================================
  # defaults.priorityClassName tests
  # ============================================================================
  - it: should apply defaults.priorityClassName to CronJob resources
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.priorityClassName: test-defaults-priority-class
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.priorityClassName
          value: test-defaults-priority-class

  # ============================================================================
  # defaults.dns.policy tests
  # ============================================================================
  - it: should apply defaults.dns.policy to CronJob resources
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.dns.policy: None
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.dnsPolicy
          value: None

  # ============================================================================
  # defaults.dns.config tests
  # ============================================================================
  - it: should apply defaults.dns.config to CronJob resources
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.dns.config:
        nameservers:
          - "1.2.3.4"
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.dnsConfig.nameservers[0]
          value: "1.2.3.4"

  # ============================================================================
  # defaults.securityContext tests
  # ============================================================================
  - it: should apply defaults.securityContext to CronJob pod specs
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.securityContext:
        runAsUser: 12345
        runAsNonRoot: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.securityContext.runAsUser
          value: 12345

  # ============================================================================
  # defaults.image.pullPolicy tests
  # ============================================================================
  - it: should apply defaults.image.pullPolicy to CronJob containers
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.image.pullPolicy: Always
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].imagePullPolicy
          value: Always

  # ============================================================================
  # defaults.image.pullSecrets tests
  # ============================================================================
  - it: should apply defaults.image.pullSecrets to CronJob resources
    documentSelector:
      path: kind
      value: CronJob
    set:
      defaults.image.pullSecrets:
        - name: test-defaults-pull-secret
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets[0].name
          value: test-defaults-pull-secret

  - it: should fall back to deprecated imagePullSecrets when defaults.image.pullSecrets is not set
    documentSelector:
      path: kind
      value: CronJob
    set:
      imagePullSecrets:
        - name: deprecated-pull-secret
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets[0].name
          value: deprecated-pull-secret
