# Test that all resources inherit defaults.labels and defaults.annotations
#
# This test validates that every Kubernetes resource generated by the Helm chart
# properly inherits labels and annotations set in defaults.labels and defaults.annotations.
# This ensures consistent metadata across all resources for organizational tagging,
# monitoring, and cost tracking requirements.
#
# The test sets a sentinel label/annotation (foo: "bar") and verifies it appears in
# all resource metadata. Optional features are enabled to ensure conditional templates
# render for testing.
#
# Note: aggregator-secret.yaml is excluded because it only renders when apiKey is set,
# which is mutually exclusive with existingSecretName used in the test values.
#
suite: test that all resources inherit defaults.labels and defaults.annotations
templates:
  - agent-clusterrole.yaml
  - agent-clusterrolebinding.yaml
  - agent-cm.yaml
  # agent-daemonset-cm.yaml and agent-daemonset.yaml only render in federated mode
  - agent-deploy.yaml
  - agent-pdb.yaml
  - agent-pvc.yaml
  - agent-serviceaccount.yaml
  - aggregator-cm.yaml
  - aggregator-deploy.yaml
  - aggregator-pdb.yaml
  # aggregator-secret.yaml - only renders when apiKey is set (mutually exclusive with existingSecretName)
  - aggregator-service.yaml
  - backfill-job.yaml
  - config-loader-job.yaml
  - helmless-cm.yaml
  - helmless-job.yaml
  - init-cert-clusterrole.yaml
  - init-cert-clusterrolebinding.yaml
  - init-cert-job.yaml
  - validator-cm.yaml
  - webhook-cm.yaml
  - webhook-deploy.yaml
  - webhook-pdb.yaml
  - webhook-service.yaml
  - webhook-serviceaccount.yaml
  - webhook-tls-secret.yaml
  - webhook-validating-config.yaml
tests:
  - it: should apply defaults.labels foo=bar to all resource metadata
    # Validates that defaults.labels propagates to every resource's metadata.labels.
    # Uses a sentinel label (foo: "bar") to verify inheritance.
    #
    # Optional features enabled to render conditional templates:
    # - insightsController.enabled: Renders webhook-related resources
    # - insightsController.tls.secret.create: Renders webhook-tls-secret.yaml
    # - initCertJob.enabled: Renders init-cert-job and related RBAC resources
    # - components.agent.mode: agent: Renders agent-deploy.yaml (test uses non-federated mode to include deployment)
    # - server.persistentVolume.enabled: Renders agent-pvc.yaml
    set:
      defaults.labels:
        foo: "bar"
      insightsController.enabled: true
      insightsController.tls.secret.create: true
      insightsController.tls.useCertManager: false
      initCertJob.enabled: true
      components.agent.mode: agent
      server.persistentVolume.enabled: true
    asserts:
      - equal:
          path: metadata.labels.foo
          value: "bar"

  - it: should apply defaults.annotations foo=bar to all resource metadata
    # Validates that defaults.annotations propagates to every resource's metadata.annotations.
    # Uses a sentinel annotation (foo: "bar") to verify inheritance.
    #
    # Tested separately from labels to ensure both metadata types are properly handled.
    set:
      defaults.annotations:
        foo: "bar"
      insightsController.enabled: true
      insightsController.tls.secret.create: true
      insightsController.tls.useCertManager: false
      initCertJob.enabled: true
      components.agent.mode: agent
      server.persistentVolume.enabled: true
    asserts:
      - equal:
          path: metadata.annotations.foo
          value: "bar"
