# Test defaults.* properties for Job resources
#
# This test validates that Job resources properly inherit all applicable
# defaults from the chart's defaults section, including:
# - Metadata defaults: labels, annotations
# - PodSpec defaults: affinity, tolerations, nodeSelector, priorityClassName,
#   dns.policy, dns.config, securityContext, image settings
#
# Templates tested:
# - config-loader-job.yaml
# - helmless-job.yaml
# - init-cert-job.yaml
# - backfill-job.yaml (produces both CronJob at index 0 and Job at index 1)
suite: defaults.* properties apply to Job resources
templates:
  - config-loader-job.yaml
  - helmless-job.yaml
  - init-cert-job.yaml
  - backfill-job.yaml
tests:
  # ============================================================================
  # defaults.labels tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.labels to all Job metadata
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  # ============================================================================
  # defaults.annotations tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.annotations to all Job metadata
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation

  # ============================================================================
  # defaults.affinity tests
  # ============================================================================
  - it: should apply defaults.affinity to all Job resources
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: test-defaults-affinity
                    operator: In
                    values:
                      - test-value
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: test-defaults-affinity

  # ============================================================================
  # defaults.tolerations tests
  # ============================================================================
  - it: should apply defaults.tolerations to all Job resources
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.tolerations:
        - key: test-defaults-toleration
          operator: Equal
          value: test-value
          effect: NoSchedule
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: test-defaults-toleration

  # ============================================================================
  # defaults.nodeSelector tests
  # ============================================================================
  - it: should apply defaults.nodeSelector to all Job resources
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.nodeSelector:
        test-defaults-node-selector: test-value
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.test-defaults-node-selector
          value: test-value

  # ============================================================================
  # defaults.priorityClassName tests
  # ============================================================================
  - it: should apply defaults.priorityClassName to all Job resources
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.priorityClassName: test-defaults-priority-class
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: test-defaults-priority-class

  # ============================================================================
  # defaults.dns.policy tests
  # ============================================================================
  - it: should apply defaults.dns.policy to all Job resources
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.dns.policy: None
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.dnsPolicy
          value: None

  # ============================================================================
  # defaults.dns.config tests
  # ============================================================================
  - it: should apply defaults.dns.config to all Job resources
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.dns.config:
        nameservers:
          - "1.2.3.4"
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig.nameservers[0]
          value: "1.2.3.4"

  # ============================================================================
  # defaults.securityContext tests
  # ============================================================================
  - it: should apply defaults.securityContext to all Job pod specs
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.securityContext:
        runAsUser: 12345
        runAsNonRoot: true
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 12345

  # ============================================================================
  # defaults.image.pullPolicy tests
  # ============================================================================
  - it: should apply defaults.image.pullPolicy to config-loader-job containers
    template: config-loader-job.yaml
    set:
      defaults.image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should apply defaults.image.pullPolicy to helmless-job containers
    template: helmless-job.yaml
    set:
      defaults.image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should apply defaults.image.pullPolicy to init-cert-job containers
    template: init-cert-job.yaml
    set:
      defaults.image.pullPolicy: Always
      initCertJob.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  # ============================================================================
  # defaults.image.pullSecrets tests
  # ============================================================================
  - it: should apply defaults.image.pullSecrets to all Job resources
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      defaults.image.pullSecrets:
        - name: test-defaults-pull-secret
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: test-defaults-pull-secret

  - it: should fall back to deprecated imagePullSecrets when defaults.image.pullSecrets is not set
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Job
    set:
      imagePullSecrets:
        - name: deprecated-pull-secret
      initCertJob.enabled: true
      initBackfillJob.enabled: true
      insightsController.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: deprecated-pull-secret
