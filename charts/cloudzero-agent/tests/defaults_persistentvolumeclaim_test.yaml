# Test defaults.* properties for PersistentVolumeClaim resources
#
# This test validates that PersistentVolumeClaim resources properly inherit
# defaults.labels and defaults.annotations from the chart's defaults section.
#
# PVCs only support metadata-level defaults (labels and annotations).
# PodSpec defaults (affinity, tolerations, etc.) do not apply to PVCs.
#
# Templates tested:
# - agent-pvc.yaml
suite: defaults.* properties apply to PersistentVolumeClaim resources
templates:
  - agent-pvc.yaml
tests:
  # ============================================================================
  # defaults.labels tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.labels to PersistentVolumeClaim metadata
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      server.persistentVolume.enabled: true
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  # ============================================================================
  # defaults.annotations tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.annotations to PersistentVolumeClaim metadata
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      server.persistentVolume.enabled: true
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation
