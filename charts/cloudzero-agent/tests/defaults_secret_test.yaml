# Test defaults.* properties for Secret resources
#
# This test validates that Secret resources properly inherit
# defaults.labels and defaults.annotations from the chart's defaults section.
#
# Secrets only support metadata-level defaults (labels and annotations).
# PodSpec defaults (affinity, tolerations, etc.) do not apply to Secrets.
#
# Templates tested:
# - aggregator-secret.yaml (only renders when apiKey is set)
# - webhook-tls-secret.yaml (only renders when insightsController.tls.secret.create is true)
suite: defaults.* properties apply to Secret resources
templates:
  - aggregator-secret.yaml
  - webhook-tls-secret.yaml
tests:
  # ============================================================================
  # defaults.labels tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.labels to all Secret metadata
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Secret
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      apiKey: test-api-key-for-secret
      existingSecretName: null
      insightsController.enabled: true
      insightsController.tls.secret.create: true
      insightsController.tls.useCertManager: false
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  - it: should apply defaults.labels to aggregator-secret metadata
    template: aggregator-secret.yaml
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      apiKey: test-api-key-for-secret
      existingSecretName: null
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  - it: should apply defaults.labels to webhook-tls-secret metadata
    template: webhook-tls-secret.yaml
    set:
      defaults.labels:
        test-defaults-label: sentinel-value-label
      insightsController.enabled: true
      insightsController.tls.secret.create: true
      insightsController.tls.useCertManager: false
    asserts:
      - equal:
          path: metadata.labels.test-defaults-label
          value: sentinel-value-label

  # ============================================================================
  # defaults.annotations tests (resource metadata)
  # ============================================================================
  - it: should apply defaults.annotations to all Secret metadata
    documentSelector:
      matchMany: true
      path: kind
      skipEmptyTemplates: true
      value: Secret
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      apiKey: test-api-key-for-secret
      existingSecretName: null
      insightsController.enabled: true
      insightsController.tls.secret.create: true
      insightsController.tls.useCertManager: false
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation

  - it: should apply defaults.annotations to aggregator-secret metadata
    template: aggregator-secret.yaml
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      apiKey: test-api-key-for-secret
      existingSecretName: null
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation

  - it: should apply defaults.annotations to webhook-tls-secret metadata
    template: webhook-tls-secret.yaml
    set:
      defaults.annotations:
        test-defaults-annotation: sentinel-value-annotation
      insightsController.enabled: true
      insightsController.tls.secret.create: true
      insightsController.tls.useCertManager: false
    asserts:
      - equal:
          path: metadata.annotations.test-defaults-annotation
          value: sentinel-value-annotation
