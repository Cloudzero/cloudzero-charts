apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cloudzero-agent.helmlessJobName" . }}
  namespace: {{ .Release.Namespace }}
  {{- include "cloudzero-agent.generateAnnotations" (dict
      "root" .
      "annotations" (list
        .Values.defaults.annotations
        .Values.components.miscellaneous.helmless.annotations
      )
    ) | nindent 2 }}
  {{- include "cloudzero-agent.generateLabels" (dict
      "root" .
      "name" "helmless"
      "labels" (list
        .Values.defaults.labels
        .Values.commonMetaLabels
        .Values.components.miscellaneous.helmless.labels
      )
    ) | nindent 2 }}
spec:
  template:
    metadata:
      name: {{ include "cloudzero-agent.helmlessJobName" . }}
      namespace: {{ .Release.Namespace }}
      {{- include "cloudzero-agent.generateLabels" (dict
          "root" .
          "name" "helmless"
          "labels" (list
            .Values.defaults.labels
            .Values.commonMetaLabels
            .Values.components.miscellaneous.helmless.labels
            .Values.components.miscellaneous.helmless.podLabels
          )
        ) | nindent 6 }}
      {{- include "cloudzero-agent.generateAnnotations" (dict
          "root" .
          "annotations" (list
            .Values.defaults.annotations
            .Values.components.miscellaneous.helmless.annotations
            .Values.components.miscellaneous.helmless.podAnnotations
          )
        ) | nindent 6 }}
    spec:
      restartPolicy: OnFailure
      {{- include "cloudzero-agent.generateImagePullSecrets" (dict "root" . "image" .Values.components.agent.image) | nindent 6 }}
      {{- include "cloudzero-agent.generateDNSInfo" (dict "defaults" .Values.defaults.dns) | nindent 6 }}
      {{- include "cloudzero-agent.generatePriorityClassName" .Values.defaults.priorityClassName | nindent 6 }}
      {{- include "cloudzero-agent.generatePodSecurityContext" (mergeOverwrite
          (.Values.defaults.securityContext | default (dict))
          (.Values.components.miscellaneous.helmless.securityContext | default (dict))
        ) | nindent 6 }}
      containers:
        - name: helmless
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.agent.image) | nindent 10 }}
          command:
            - /app/cloudzero-helmless
          args:
            - --configured
            - /etc/config/values/values.yaml
            - --output
            - "-"
          {{- include "cloudzero-agent.generateResources" .Values.components.miscellaneous.helmless.resources | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
                (.Values.defaults.securityContext | default (dict))
                (.Values.components.miscellaneous.helmless.securityContext | default (dict))
              ) | nindent 10 }}
          volumeMounts:
            - name: helmless-cm
              mountPath: /etc/config/values
              readOnly: true
      volumes:
        - name: helmless-cm
          configMap:
            name: {{ include "cloudzero-agent.helmlessConfigMapName" . }}
      {{- include "cloudzero-agent.generateNodeSelector" (dict "default" .Values.defaults.nodeSelector) | nindent 6 }}
      {{- include "cloudzero-agent.generateAffinity" (dict "default" .Values.defaults.affinity) | nindent 6 }}
      {{- include "cloudzero-agent.generateTolerations" .Values.defaults.tolerations | nindent 6 }}
