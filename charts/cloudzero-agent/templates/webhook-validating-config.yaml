{{/*
CloudZero Agent Validating Webhook Configuration

This template creates the Kubernetes ValidatingWebhookConfiguration that registers
CloudZero Agent with the Kubernetes API server for admission control. The webhook
configuration defines which resources and operations trigger CloudZero metadata
collection for cost allocation analysis.

Webhook Registration Features:
- Resource coverage: Monitors 20+ Kubernetes resource types for complete cost visibility
- Operation scope: Captures CREATE, UPDATE, DELETE operations for lifecycle tracking
- Namespace filtering: Configurable namespace inclusion/exclusion patterns
- Fail-open policy: Never blocks cluster operations, ensuring high availability
- TLS configuration: Automatic certificate injection via cert-manager integration

Supported Resources (see app/types/k8s_object.go):
- Workload resources: Deployments, StatefulSets, DaemonSets, ReplicaSets, Pods
- Infrastructure: Nodes, Services, StorageClasses, PersistentVolumes/Claims
- Networking: Ingresses, IngressClasses, Gateways (service mesh)
- Batch workloads: Jobs, CronJobs
- Custom resources: CRDs and custom resource instances

This configuration is essential for CloudZero cost allocation completeness,
ensuring no Kubernetes resources are missed in cost attribution analysis.
*/}}
{{- if .Values.insightsController.enabled }}
{{ $labelsEnabled := $.Values.insightsController.labels.enabled }}
{{ $annotationEnabled := $.Values.insightsController.annotations.enabled }}
{{- if or $labelsEnabled $annotationEnabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "cloudzero-agent.validatingWebhookConfigName" $ }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "cloudzero-agent.insightsController.labels" $ | nindent 4 }}
  # Certificate management annotations for automatic TLS certificate injection
  # When cert-manager is enabled, automatically injects CA bundle for webhook TLS validation
  {{- $certManagerAnnotations := dict -}}
  {{- if $.Values.insightsController.tls.useCertManager -}}
  {{- $certManagerAnnotations = dict "cert-manager.io/inject-ca-from" ($.Values.insightsController.webhooks.caInjection | default (printf "%s/%s" $.Release.Namespace (include "cloudzero-agent.certificateName" $))) -}}
  {{- end -}}
  {{- include "cloudzero-agent.generateAnnotations" (merge (deepCopy $.Values.defaults.annotations) $certManagerAnnotations) | nindent 2 }}
webhooks:
  - name: {{ include "cloudzero-agent.validatingWebhookName" $ }}
    # Namespace selector: Controls which namespaces trigger webhook processing
    # Supports inclusion/exclusion patterns for fine-grained resource selection
    namespaceSelector: {{ toYaml $.Values.insightsController.webhooks.namespaceSelector | nindent 6 }}
    # Failure policy: 'Ignore' ensures fail-open behavior - never blocks cluster operations
    # Critical for production stability: webhook failures don't impact workload deployments
    failurePolicy: Ignore
    rules:
      - operations: [ "CREATE", "UPDATE", "DELETE" ]
        apiGroups: ["*"]
        apiVersions: ["*"]
        resources:
          {{/* See app/types/k8s_object.go for the list of supported resources */}}
          - deployments
          - statefulsets
          - daemonsets
          - replicasets
          - pods
          - namespaces
          - nodes
          - services
          - storageclasses
          - persistentvolumes
          - persistentvolumeclaims
          - jobs
          - cronjobs
          - customresourcedefinitions
          - ingresses
          - ingressclasses
          - gateways
          - gatewayclasses
        scope: "*"
    clientConfig:
      service:
        namespace: {{ $.Release.Namespace }}
        name: {{ include "cloudzero-agent.serviceName" $ }}
        path: {{ $.Values.insightsController.webhooks.path }}
        port: {{ $.Values.insightsController.service.port }}
      {{- if (gt (len $.Values.insightsController.tls.caBundle) 1 ) }}
      caBundle: {{ $.Values.insightsController.tls.caBundle | quote }}
      {{- else if $.Values.insightsController.tls.useCertManager }}
      caBundle: ''
      {{- end }}
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: {{ .Values.insightsController.webhooks.timeoutSeconds }}
{{- end }}
{{- end }}
