{{/*
ServiceMonitor for the CloudZero Agent collector (aggregator deployment).

Tells the Prometheus Operator to scrape collector metrics on port 8080 (exposed
as service port "metrics" on port 80). These include metrics_received_total,
metrics_received_cost_total, and http_request_duration_seconds.

See: Monitoring the CloudZero Agent > Monitoring Data Pipeline Health
*/}}
{{- if include "cloudzero-agent.monitoring.enabled" . }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cloudzero-agent.aggregator.name" . }}-collector
  namespace: {{ .Values.components.monitoring.namespace | default .Release.Namespace }}
  labels:
    {{- include "cloudzero-agent.baseLabels" . | nindent 4 }}
    app.kubernetes.io/component: collector
    {{- with .Values.components.monitoring.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "cloudzero-agent.aggregator.matchLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s
{{- end }}
