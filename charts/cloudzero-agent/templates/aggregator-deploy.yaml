{{/*
CloudZero Agent Aggregator Deployment

This deployment template creates the CloudZero Agent Aggregator, the core component responsible
for high-throughput metric ingestion from Prometheus instances, intelligent data filtering,
and reliable transmission to the CloudZero platform for cost allocation analysis.

The aggregator operates as a multi-container deployment consisting of:
1. Collector container: Receives Prometheus remote_write data via HTTP endpoint
2. Shipper container: Processes, compresses, and uploads data to CloudZero platform

Key operational characteristics:
- High availability: Multiple replicas for resilience and load distribution
- Persistent storage: Reliable data buffering for transmission failures
- Configuration management: Checksum-based rolling updates for zero-downtime changes
- Resource management: CPU/memory limits and requests for predictable performance
- Security: Service account-based RBAC and secret management integration

The aggregator is designed to handle production-scale Prometheus data volumes while
maintaining data integrity and providing comprehensive operational monitoring.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudzero-agent.aggregator.name" . }}
  namespace: {{ .Release.Namespace }}
  # Annotations: Merge default annotations with aggregator-specific annotations
  # Enables custom metadata for monitoring, backup policies, and operational tooling
  {{- include "cloudzero-agent.generateAnnotations" (dict
      "root" .
      "annotations" (list
        .Values.defaults.annotations
        .Values.components.aggregator.annotations
      )
    ) | nindent 2 }}
  # Labels: Combine standard aggregator labels with user-defined metadata labels
  # Provides consistent labeling for service discovery, monitoring, and resource management
  {{- include "cloudzero-agent.generateLabels" (dict
      "root" .
      "name" "aggregator"
      "labels" (list
        .Values.defaults.labels
        .Values.commonMetaLabels
        .Values.components.aggregator.labels
      )
    ) | nindent 2 }}
spec:
  selector:
    matchLabels:
      {{- include "cloudzero-agent.aggregator.matchLabels" . | nindent 6 }}
  replicas: {{ .Values.components.aggregator.replicas | default .Values.defaults.replicas }}
  template:
    metadata:
      {{- include "cloudzero-agent.generateAnnotations" (dict
          "root" .
          "annotations" (list
            .Values.defaults.annotations
            .Values.components.aggregator.annotations
            .Values.components.aggregator.podAnnotations
            (dict "checksum/config" (include "cloudzero-agent.configurationChecksum" .))
          )
        ) | nindent 6 }}
      {{- include "cloudzero-agent.generateLabels" (dict
          "root" .
          "name" "aggregator"
          "labels" (list
            .Values.defaults.labels
            .Values.commonMetaLabels
            .Values.components.aggregator.labels
            .Values.components.aggregator.podLabels
          )
        ) | nindent 6 }}
    spec:
      serviceAccountName: {{ template "cloudzero-agent.serviceAccountName" . }}
      {{- include "cloudzero-agent.generatePriorityClassName" (.Values.defaults.priorityClassName | default .Values.server.priorityClassName) | nindent 6 }}
      containers:
        - name: {{ include "cloudzero-agent.aggregator.name" . }}-collector
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.agent.image "compat" .Values.aggregator.image) | nindent 10 }}
          ports:
            - name: port-collector
              containerPort: {{ .Values.aggregator.collector.port }}
          command: ["/app/cloudzero-collector", "-config", "{{ .Values.aggregator.mountRoot }}/config/config.yml"]
          env:
            - name: SERVER_PORT
              value: "{{ .Values.aggregator.collector.port }}"
          volumeMounts:
            {{- include "cloudzero-agent.apiKeyVolumeMount" . | nindent 12 }}
            - name: aggregator-config-volume
              mountPath: {{ .Values.aggregator.mountRoot }}/config
              readOnly: true
            - name: aggregator-persistent-storage
              mountPath: {{ .Values.aggregator.mountRoot }}/data
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.aggregator.collector.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.aggregator.collector.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          {{- include "cloudzero-agent.generateResources" (include "cloudzero-agent.mergeStringOverwrite" (list
              (.Values.components.aggregator.collector.resources | default (dict))
              (.Values.aggregator.collector.resources | default (dict))
            ) | fromYaml) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
              (.Values.defaults.securityContext | default (dict))
              (.Values.aggregator.collector.securityContext | default (dict))
            ) | nindent 10 }}

        - name: {{ include "cloudzero-agent.aggregator.name" . }}-shipper
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.agent.image "compat" .Values.aggregator.image) | nindent 10 }}
          ports:
            - name: port-shipper
              containerPort: {{ .Values.aggregator.shipper.port }}
          command: ["/app/cloudzero-shipper", "-config", "{{ .Values.aggregator.mountRoot }}/config/config.yml"]
          env:
            - name: SERVER_PORT
              value: "{{ .Values.aggregator.shipper.port }}"
          volumeMounts:
            {{- include "cloudzero-agent.apiKeyVolumeMount" . | nindent 12 }}
            - name: aggregator-config-volume
              mountPath: {{ .Values.aggregator.mountRoot }}/config
              readOnly: true
            - name: aggregator-persistent-storage
              mountPath: {{ .Values.aggregator.mountRoot }}/data
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.aggregator.shipper.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.aggregator.shipper.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          {{- include "cloudzero-agent.generateResources" (include "cloudzero-agent.mergeStringOverwrite" (list
              (.Values.components.aggregator.shipper.resources | default (dict))
              (.Values.aggregator.shipper.resources | default (dict))
            ) | fromYaml) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
              (.Values.defaults.securityContext | default (dict))
              (.Values.aggregator.shipper.securityContext | default (dict))
            ) | nindent 10 }}
      {{- include "cloudzero-agent.generatePodSecurityContext" (mergeOverwrite
          (.Values.defaults.securityContext | default (dict))
          (.Values.components.aggregator.securityContext | default (dict))
        ) | nindent 6 }}
      {{- include "cloudzero-agent.generateDNSInfo" (dict "defaults" .Values.defaults.dns) | nindent 6 }}
      {{- include "cloudzero-agent.generateImagePullSecrets" (dict "root" . "image" .Values.components.agent.image) | nindent 6 }}
      {{- include "cloudzero-agent.generateNodeSelector" (dict "default" .Values.defaults.nodeSelector "nodeSelector" .Values.aggregator.nodeSelector) | nindent 6 }}
      {{- include "cloudzero-agent.generateAffinity" (dict "default" .Values.defaults.affinity) | nindent 6 }}
      {{- include "cloudzero-agent.generateTolerations" (concat .Values.defaults.tolerations) | nindent 6 }}

    {{- with .Values.server.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      terminationGracePeriodSeconds: {{ default 300 .Values.server.terminationGracePeriodSeconds }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ template "cloudzero-agent.configMapName" . }}
        - name: validator-config-volume
          configMap:
            name: {{ template "cloudzero-agent.validatorConfigMapName" . }}
        - name: lifecycle-volume
          emptyDir: {}
        {{- include "cloudzero-agent.apiKeyVolume" . | nindent 8 }}
        - name: aggregator-config-volume
          configMap:
            name: {{ include "cloudzero-agent.aggregator.name" . }}
        - name: aggregator-persistent-storage
        {{- if .Values.aggregator.database.emptyDir.enabled }}
          emptyDir:
          {{- if .Values.aggregator.database.emptyDir.sizeLimit }}
            sizeLimit: {{ .Values.aggregator.database.emptyDir.sizeLimit }}
          {{- else}}
            {}
        {{- end }}
{{- end }}
