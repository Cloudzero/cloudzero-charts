apiVersion: apps/v1
kind: Deployment
metadata:
  {{- include "cloudzero-agent.generateLabels" (dict
      "root" .
      "name" "server"
      "labels" (list
        .Values.defaults.labels
        .Values.commonMetaLabels
        .Values.components.agent.labels
      )
    ) | nindent 2 }}
  {{- include "cloudzero-agent.generateAnnotations" (dict
      "root" .
      "annotations" (list
        .Values.defaults.annotations
        .Values.server.deploymentAnnotations
        .Values.components.agent.annotations
      )
    ) | nindent 2 }}
  name: {{ template "cloudzero-agent.server.fullname" . }}
  namespace: {{ include "cloudzero-agent.namespace" . }}
spec:
  selector:
    matchLabels:
      {{- include "cloudzero-agent.server.matchLabels" . | nindent 6 }}
  {{- if eq (include "cloudzero-agent.Values.components.agent.mode" .) "clustered" }}
  replicas: {{ .Values.components.agent.replicas | default .Values.defaults.replicas }}
  {{- else }}
  replicas: 1
  {{- end }}
  {{- if .Values.server.persistentVolume.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  template:
    metadata:
      {{- include "cloudzero-agent.generateLabels" (dict
          "root" .
          "name" "server"
          "labels" (list
            .Values.defaults.labels
            .Values.commonMetaLabels
            .Values.components.agent.labels
            .Values.server.podLabels
            .Values.components.agent.podLabels
          )
        ) | nindent 6 }}
      {{- include "cloudzero-agent.generateAnnotations" (dict
          "root" .
          "annotations" (list
            .Values.defaults.annotations
            .Values.server.podAnnotations
            .Values.components.agent.annotations
            .Values.components.agent.podAnnotations
          )
        ) | nindent 6 }}
    spec:
      {{- include "cloudzero-agent.generatePriorityClassName" (.Values.defaults.priorityClassName | default .Values.server.priorityClassName) | nindent 6 }}
      serviceAccountName: {{ template "cloudzero-agent.serviceAccountName" . }}
      initContainers:
        - name: {{ .Values.validator.name }}-copy
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.agent.image "compat" .Values.validator.image) | nindent 10 }}
          env:
            {{- include "cloudzero-agent.validatorEnv" . | nindent 12 }}
          command:
            - /app/cloudzero-agent-validator
            - install
            - --destination
            - /checks/bin/cloudzero-agent-validator
          {{- include "cloudzero-agent.generateResources" (include "cloudzero-agent.mergeStringOverwrite" (list
              (.Values.components.validator.resources | default (dict))
              (.Values.validator.resources | default (dict))
            ) | fromYaml) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
              (.Values.defaults.securityContext | default (dict))
              (.Values.components.validator.securityContext | default (dict))
            ) | nindent 10 }}
          volumeMounts:
          {{- include "cloudzero-agent.apiKeyVolumeMount" . | nindent 12 }}
            - name: lifecycle-volume
              mountPath: /checks/bin/
            - name: validator-config-volume
              mountPath: /checks/config/
        - name: {{ .Values.validator.name }}-run
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.agent.image "compat" .Values.validator.image) | nindent 10 }}
          env:
            {{- include "cloudzero-agent.validatorEnv" . | nindent 12 }}
          command:
            - /checks/bin/cloudzero-agent-validator
            - diagnose
            - pre-start
            - -f
            - /checks/config/validator.yml
          {{- include "cloudzero-agent.generateResources" (include "cloudzero-agent.mergeStringOverwrite" (list
              (.Values.components.validator.resources | default (dict))
              (.Values.validator.resources | default (dict))
            ) | fromYaml) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
              (.Values.defaults.securityContext | default (dict))
              (.Values.components.validator.securityContext | default (dict))
            ) | nindent 10 }}
          volumeMounts:
          {{- include "cloudzero-agent.apiKeyVolumeMount" . | nindent 12 }}
            - name: lifecycle-volume
              mountPath: /checks/bin/
            - name: validator-config-volume
              mountPath: /checks/config/
      containers:
        {{- if .Values.configmapReload.prometheus.enabled }}
        # ConfigMap reloader sidecar for Prometheus/Alloy
        - name: {{ template "cloudzero-agent.name" . }}-{{ .Values.server.name }}-configmap-reload
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.prometheusReloader.image "compat" .Values.configmapReload.prometheus.image) | nindent 10 }}
          args:
            - --watched-dir=/etc/config
            - --reload-url=http://127.0.0.1:9090/-/reload
            - --listen-address=:8080
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 4
            failureThreshold: 3
            successThreshold: 1
          {{- include "cloudzero-agent.generateResources" (include "cloudzero-agent.mergeStringOverwrite" (list
              (.Values.components.agent.reloader.resources | default (dict))
              (.Values.configmapReload.prometheus.resources | default (dict))
            ) | fromYaml) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
              (.Values.defaults.securityContext | default (dict))
              (.Values.components.agent.reloader.securityContext | default (dict))
            ) | nindent 10 }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
        {{- end }}
        {{- if ne (include "cloudzero-agent.Values.components.agent.mode" .) "clustered" }}
        # Prometheus server container
        - name: {{ template "cloudzero-agent.name" . }}-server
          {{- include "cloudzero-agent.generateImage" (dict
            "defaults" .Values.defaults.image
            "image" .Values.components.prometheus.image
            "compat" (dict
              "repository" .Values.server.image.repository
              "tag" (include "cloudzero-agent.Values.components.prometheus.image.tag" .)
              "digest" .Values.server.image.digest
              "pullPolicy" .Values.server.image.pullPolicy)) | nindent 10 }}
          {{- if .Values.server.env }}
          env:
{{ toYaml .Values.server.env | indent 12}}
            {{- include "cloudzero-agent.validatorEnv" . | nindent 12 }}
          {{- end }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /checks/cloudzero-agent-validator
                  - diagnose
                  - post-start
                  - -f
                  - /checks/app/config/validator.yml
            preStop:
              exec:
                command:
                  - /checks/cloudzero-agent-validator
                  - diagnose
                  - pre-stop
                  - -f
                  - /checks/app/config/validator.yml
          args:
            {{ toYaml .Values.server.args | nindent 12}}
            {{- $agentFlag := include "cloudzero-agent.prometheusAgentFlag" . }}
            {{- if $agentFlag }}
            - {{ $agentFlag }}
            - --storage.agent.path={{ .Values.server.persistentVolume.mountPath }}
            {{- else }}
            - --storage.tsdb.path={{ .Values.server.persistentVolume.mountPath }}
            {{- end }}
            - --log.level={{ .Values.server.logging.level | default "info" }}
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
              scheme: HTTP
            initialDelaySeconds: {{ default 30 .Values.server.readinessProbeInitialDelay }}
            periodSeconds: {{ default 5 .Values.server.readinessProbePeriodSeconds }}
            timeoutSeconds: {{ default 4 .Values.server.readinessProbeTimeout }}
            failureThreshold: {{ default 3 .Values.server.readinessProbeFailureThreshold }}
            successThreshold: {{ default 1 .Values.server.readinessProbeSuccessThreshold }}
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
              scheme: HTTP
            initialDelaySeconds: {{ default 30 .Values.server.livenessProbeInitialDelay }}
            periodSeconds: {{ default 15 .Values.server.livenessProbePeriodSeconds }}
            timeoutSeconds: {{ default 10 .Values.server.livenessProbeTimeout }}
            failureThreshold: {{ default 3 .Values.server.livenessProbeFailureThreshold }}
            successThreshold: {{ default 1 .Values.server.livenessProbeSuccessThreshold }}
          {{- include "cloudzero-agent.generateResources" (include "cloudzero-agent.mergeStringOverwrite" (list
              (.Values.components.agent.resources | default (dict))
              (.Values.server.resources | default (dict))
            ) | fromYaml) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
              (.Values.defaults.securityContext | default (dict))
              (.Values.components.agent.securityContext | default (dict))
            ) | nindent 10 }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config/prometheus/configmaps/
            - name: cloudzero-agent-storage-volume
              mountPath: {{ .Values.server.persistentVolume.mountPath }}
              subPath: "{{ .Values.server.persistentVolume.subPath }}"
            - name: lifecycle-volume
              mountPath: /checks/
            - name: validator-config-volume
              mountPath: /checks/app/config/
            {{- include "cloudzero-agent.apiKeyVolumeMount" . | nindent 12 }}
        {{- end }}{{/* End Prometheus container */}}
        {{- if eq (include "cloudzero-agent.Values.components.agent.mode" .) "clustered" }}
        # CloudZero Alloy container (binary embedded in agent image)
        - name: {{ template "cloudzero-agent.name" . }}-alloy
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.agent.image "compat" .Values.components.agent.clusteredNode.image) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerCommand" (dict "command" .Values.components.agent.clusteredNode.command "default" (list "/app/cloudzero-alloy")) | nindent 10 }}
          args:
            - run
            - /etc/alloy/alloy-config.river
            - --server.http.listen-addr=0.0.0.0:9090
            - --storage.path=/tmp/alloy
            {{- if .Values.components.agent.kubeState.enabled }}
            - --stability.level=public-preview
            {{- end }}
            {{- if eq (include "cloudzero-agent.Values.components.agent.mode" .) "federated" }}
            - --cluster.enabled=true
            - --cluster.name={{ .Values.clusterName }}
            {{- end }}
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- include "cloudzero-agent.validatorEnv" . | nindent 12 }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /checks/cloudzero-agent-validator
                  - diagnose
                  - post-start
                  - -f
                  - /checks/app/config/validator.yml
            preStop:
              exec:
                command:
                  - /checks/cloudzero-agent-validator
                  - diagnose
                  - pre-stop
                  - -f
                  - /checks/app/config/validator.yml
          ports:
            - name: http-metrics
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          {{- include "cloudzero-agent.generateResources" (.Values.components.agent.clusteredNode.resources | default (dict)) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
              (.Values.defaults.securityContext | default (dict))
              (.Values.components.agent.securityContext | default (dict))
            ) | nindent 10 }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/alloy
              readOnly: true
            - name: lifecycle-volume
              mountPath: /checks/
            - name: validator-config-volume
              mountPath: /checks/app/config/
            {{- include "cloudzero-agent.apiKeyVolumeMount" . | nindent 12 }}
        {{- end }}{{/* End Alloy container */}}
      {{- include "cloudzero-agent.generatePodSecurityContext" (mergeOverwrite
          (.Values.defaults.securityContext | default (dict))
          (.Values.components.agent.securityContext | default (dict))
        ) | nindent 6 }}
      {{- include "cloudzero-agent.generateDNSInfo" (dict "defaults" .Values.defaults.dns) | nindent 6 }}
      {{- include "cloudzero-agent.generateImagePullSecrets" (dict "root" . "image" .Values.components.prometheus.image) | nindent 6 }}
      {{- include "cloudzero-agent.generateNodeSelector" (dict "default" .Values.defaults.nodeSelector "nodeSelector" .Values.server.nodeSelector) | nindent 6 }}
      {{- include "cloudzero-agent.generateTolerations" (concat .Values.defaults.tolerations .Values.server.tolerations) | nindent 6 }}
      {{- include "cloudzero-agent.generateAffinity" (dict "default" .Values.defaults.affinity "affinity" .Values.server.affinity) | nindent 6 }}
    {{- with .Values.server.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      terminationGracePeriodSeconds: {{ default 300 .Values.server.terminationGracePeriodSeconds }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ template "cloudzero-agent.configMapName" . }}
        - name: validator-config-volume
          configMap:
            name: {{ template "cloudzero-agent.validatorConfigMapName" . }}
        - name: lifecycle-volume
          emptyDir: {}
        {{- include "cloudzero-agent.apiKeyVolume" . | nindent 8 }}
        - name: cloudzero-agent-storage-volume
        {{- if .Values.server.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ if .Values.server.persistentVolume.existingClaim }}{{ .Values.server.persistentVolume.existingClaim }}{{- else }}{{ template "cloudzero-agent.server.fullname" . }}{{- end }}
        {{- else }}
          emptyDir:
          {{- if .Values.server.emptyDir.sizeLimit }}
            sizeLimit: {{ .Values.server.emptyDir.sizeLimit }}
          {{- else }}
            {}
          {{- end }}
        {{- end }}
{{- /* end deployment */ -}}
