{{/*
CloudZero Agent Webhook Server Deployment

This deployment template creates the CloudZero Agent Webhook Server (Insights Controller),
which implements Kubernetes admission webhooks for cost allocation metadata extraction
and resource lifecycle tracking. The webhook server intercepts Kubernetes resource
creation and modification events to collect cost allocation metadata.

Key features:
- Kubernetes admission control: Validates and enriches resources with cost metadata
- High availability: Multiple replicas with anti-affinity for fault tolerance
- TLS security: Automatic certificate management for secure webhook endpoints
- Fail-open design: Never blocks cluster operations, always allows resources
- Comprehensive monitoring: Metrics and logging for operational visibility

Operational characteristics:
- HTTPS-only: All webhook traffic encrypted using TLS certificates
- Service mesh compatibility: Configurable Istio sidecar injection
- Resource constraints: CPU/memory limits for predictable resource usage
- Pod disruption budgets: Maintains availability during cluster maintenance
- Configuration management: Checksum-based rolling updates

The webhook server is essential for CloudZero cost allocation accuracy,
ensuring complete resource metadata collection across all Kubernetes workloads.
*/}}
{{- if .Values.insightsController.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudzero-agent.insightsController.deploymentName" . }}
  namespace: {{ .Release.Namespace }}
  # Standard webhook server labels for consistent resource identification
  {{- include "cloudzero-agent.generateLabels" (dict
      "root" .
      "name" "webhook-server"
      "labels" (list
        .Values.defaults.labels
        .Values.commonMetaLabels
        .Values.components.webhookServer.labels
      )
    ) | nindent 2 }}
  # Deployment annotations: Merge defaults with webhook-specific annotations
  # Supports monitoring, backup policies, and operational tooling integration
  {{- include "cloudzero-agent.generateAnnotations" (dict
      "root" .
      "annotations" (list
        .Values.defaults.annotations
        .Values.insightsController.server.deploymentAnnotations
        .Values.components.webhookServer.annotations
      )
    ) | nindent 2 }}
spec:
  replicas: {{ .Values.insightsController.server.replicaCount | default .Values.components.webhookServer.replicas | default .Values.defaults.replicas }}
  selector:
    matchLabels:
      {{- include "cloudzero-agent.insightsController.server.matchLabels" . | nindent 6 }}
  template:
    metadata:
      {{- include "cloudzero-agent.generateLabels" (dict
          "root" .
          "name" "webhook-server"
          "labels" (list
            .Values.defaults.labels
            .Values.commonMetaLabels
            .Values.components.webhookServer.labels
            .Values.components.webhookServer.podLabels
          )
        ) | nindent 6 }}
      {{- /*
        Istio mTLS Port Exclusion

        When Istio is detected and cert-manager is not in use, exclude port 8443
        from Envoy proxying. The Kubernetes API server sends admission webhook
        requests expecting the webhook's self-signed TLS certificate. Without this
        exclusion, Istio intercepts the traffic and presents its own mTLS certificate,
        which the API server doesn't trust, causing webhook calls to fail.

        Port 8443 is excluded (not 443) because Istio's sidecar intercepts inbound
        traffic at the pod level, where traffic arrives on the target port (8443),
        not the service port (443).

        See helm/docs/istio.md for full documentation.
      */ -}}
      {{- $istioAnnotations := dict -}}
      {{- if and (include "cloudzero-agent.Values.integrations.istio.enabled" .) (not .Values.insightsController.tls.useCertManager) -}}
      {{- $istioAnnotations = dict "traffic.sidecar.istio.io/excludeInboundPorts" "8443" -}}
      {{- end -}}
      {{- include "cloudzero-agent.generateAnnotations" (dict
          "root" .
          "annotations" (list
            $istioAnnotations
            .Values.defaults.annotations
            .Values.insightsController.server.podAnnotations
            .Values.components.webhookServer.annotations
            .Values.components.webhookServer.podAnnotations
            (dict "checksum/config" (include "cloudzero-agent.configurationChecksum" .))
          )
        ) | nindent 6 }}
    spec:
      serviceAccountName: {{ include "cloudzero-agent.serviceAccountName" . }}
      {{- include "cloudzero-agent.generateImagePullSecrets" (dict "root" . "image" .Values.components.agent.image) | nindent 6 }}
      {{- include "cloudzero-agent.generatePodSecurityContext" (mergeOverwrite
            (.Values.defaults.securityContext | default (dict))
            (.Values.components.webhookServer.securityContext | default (dict))
          ) | nindent 6 }}
      {{ $podAntiAffinity := dict "podAntiAffinity" (dict "preferredDuringSchedulingIgnoredDuringExecution" (list (dict "weight" 100 "podAffinityTerm" (dict "labelSelector" (dict "matchLabels" (dict "app" "webhook-server")) "topologyKey" "kubernetes.io/hostname")))) }}
      {{- $userAffinity := deepCopy .Values.insightsController.server.affinity }}
      {{- include "cloudzero-agent.generateAffinity" (dict "default" .Values.defaults.affinity "affinity" (merge $userAffinity $podAntiAffinity)) | nindent 6 }}
      {{- include "cloudzero-agent.generateDNSInfo" (dict "defaults" .Values.defaults.dns) | nindent 6 }}
      {{- include "cloudzero-agent.generatePriorityClassName" .Values.defaults.priorityClassName | nindent 6 }}
      {{- include "cloudzero-agent.generateNodeSelector" (dict "default" .Values.defaults.nodeSelector "nodeSelector" .Values.insightsController.server.nodeSelector) | nindent 6 }}
      {{- include "cloudzero-agent.generateTolerations" (concat .Values.defaults.tolerations .Values.insightsController.server.tolerations) | nindent 6 }}
      containers:
        - name: webhook-server
          {{- include "cloudzero-agent.generateImage" (dict "defaults" .Values.defaults.image "image" .Values.components.agent.image "compat" .Values.insightsController.server.image) | nindent 10 }}
          command:
            - /app/cloudzero-webhook
          args:
            - -config
            - "{{ include "cloudzero-agent.insightsController.configurationMountPath" . }}/server-config.yaml"
          ports:
            - containerPort: 8443
          {{- include "cloudzero-agent.generateResources" (include "cloudzero-agent.mergeStringOverwrite" (list
                (.Values.components.webhookServer.resources | default (dict))
                (.Values.insightsController.resources | default (dict))
              ) | fromYaml) | nindent 10 }}
          {{- include "cloudzero-agent.generateContainerSecurityContext" (mergeOverwrite
                (.Values.defaults.securityContext | default (dict))
                (.Values.components.webhookServer.securityContext | default (dict))
              ) | nindent 10 }}
          volumeMounts:
            - name: insights-server-config
              mountPath: {{ include "cloudzero-agent.insightsController.configurationMountPath" . }}
            {{- include "cloudzero-agent.apiKeyVolumeMount" . | nindent 12 }}
          {{- if or .Values.insightsController.volumeMounts .Values.insightsController.tls.enabled }}
            {{- if .Values.insightsController.tls.enabled }}
            - name: tls-certs
              mountPath: {{ .Values.insightsController.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.insightsController.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if and .Values.insightsController.server.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: {{ .Values.insightsController.server.healthCheck.path }}
              port: {{ .Values.insightsController.server.healthCheck.port }}
            initialDelaySeconds: {{ .Values.insightsController.server.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.insightsController.server.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.insightsController.server.healthCheck.timeoutSeconds }}
            successThreshold: {{ .Values.insightsController.server.healthCheck.successThreshold }}
            failureThreshold: {{ .Values.insightsController.server.healthCheck.failureThreshold }}
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: {{ .Values.insightsController.server.healthCheck.path }}
              port: {{ .Values.insightsController.server.healthCheck.port }}
            initialDelaySeconds: {{ .Values.insightsController.server.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.insightsController.server.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.insightsController.server.healthCheck.timeoutSeconds }}
            successThreshold: {{ .Values.insightsController.server.healthCheck.successThreshold }}
            failureThreshold: {{ .Values.insightsController.server.healthCheck.failureThreshold }}
          {{- end }}
      {{- if or .Values.insightsController.volumes .Values.insightsController.tls.enabled (include "cloudzero-agent.hasApiKeySource" .) }}
      volumes:
        - name: insights-server-config
          configMap:
            name: {{ include "cloudzero-agent.webhookConfigMapName" . }}
        {{- if .Values.insightsController.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ include "cloudzero-agent.tlsSecretName" . }}
        {{- end }}
        {{- include "cloudzero-agent.apiKeyVolume" . | nindent 8 }}
        {{- with .Values.insightsController.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
